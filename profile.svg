        }

        .label {
            fill: #58a6ff;
            font-weight: bold;
        }

        .value {
            fill: #c9d1d9;
        }

        .muted {
            fill: #8b949e;
        }

        .cursor {
            fill: #58a6ff;
            animation: blink 1s steps(2, start) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
